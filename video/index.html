<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FT Dropshipping — Promo Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #0A0A0F; --bg-surface: #111118;
  --purple: #7C3AED; --purple-light: #A78BFA;
  --cyan: #06B6D4; --cyan-light: #67E8F9;
  --text-primary: #F1F0F5; --text-secondary: #9594A3; --text-muted: #5D5C6D;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'IBM Plex Sans Thai', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
html { scroll-behavior: smooth; }
body { background: var(--bg-deep); color: var(--text-primary); font-family: var(--font-body); line-height: 1.7; -webkit-font-smoothing: antialiased; }
.back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--purple-light); text-decoration: none; font-family: var(--font-display); font-weight: 500; font-size: 0.95rem; padding: 1.5rem 0; transition: color 0.2s; }
.back-link:hover { color: var(--cyan-light); }
.container { max-width: 960px; margin: 0 auto; padding: 0 2rem 4rem; }
.video-section {
  margin: 1.5rem 0 2.5rem;
}
.video-section h1 {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--purple-light), var(--cyan-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 1.2rem;
  text-align: center;
}
.video-wrapper {
  background: var(--bg-surface);
  border: 1px solid rgba(124,58,237,0.2);
  border-radius: 16px;
  padding: 1rem;
  margin-bottom: 2rem;
}
.video-wrapper video {
  width: 100%;
  border-radius: 10px;
  display: block;
}
.ref-section h2 {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--purple-light);
  margin: 2rem 0 1rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid rgba(124,58,237,0.2);
}
.ref-frame {
  background: var(--bg-surface);
  border: 1px solid rgba(124,58,237,0.15);
  border-radius: 14px;
  padding: 1rem;
  display: inline-block;
}
.ref-frame img {
  max-width: 100%;
  border-radius: 8px;
  display: block;
}
.ref-frame .label {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-top: 0.6rem;
  text-align: center;
}
</style>
</head>
<body>
<div class="container">
  <a href="/" class="back-link">&larr; Back to Hub</a>

  <div class="video-section">
    <h1>FT Dropshipping Promo Video</h1>
    <div class="video-wrapper">
      <video controls preload="metadata" poster="ft-dropshipping-ref-frame.jpg">
        <source src="ft-dropshipping-promo.mp4" type="video/mp4">
        Your browser does not support the video element.
      </video>
    </div>
  </div>

  <div class="ref-section">
    <h2>Reference Frame</h2>
    <div class="ref-frame">
      <img src="ft-dropshipping-ref-frame.jpg" alt="Reference frame for promo video" loading="lazy">
      <div class="label">Video reference frame</div>
    </div>
  </div>
</div>
</body>
</html>
