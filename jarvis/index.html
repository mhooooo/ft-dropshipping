<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FT Dropshipping — Dealer JARVIS Identity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #0A0A0F; --bg-surface: #111118;
  --purple: #7C3AED; --purple-light: #A78BFA;
  --cyan: #06B6D4; --cyan-light: #67E8F9;
  --text-primary: #F1F0F5; --text-secondary: #9594A3; --text-muted: #5D5C6D;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'IBM Plex Sans Thai', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
html { scroll-behavior: smooth; }
body { background: var(--bg-deep); color: var(--text-primary); font-family: var(--font-body); line-height: 1.7; -webkit-font-smoothing: antialiased; }
.back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--purple-light); text-decoration: none; font-family: var(--font-display); font-weight: 500; font-size: 0.95rem; padding: 1.5rem 0; transition: color 0.2s; }
.back-link:hover { color: var(--cyan-light); }
.container { max-width: 900px; margin: 0 auto; padding: 0 2rem 4rem; }
.md-content h1 { font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--purple-light), var(--cyan-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 2rem 0 1rem; line-height: 1.3; }
.md-content h2 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; color: var(--purple-light); margin: 2.5rem 0 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid rgba(124,58,237,0.2); }
.md-content h3 { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; color: var(--cyan-light); margin: 2rem 0 0.6rem; }
.md-content h4, .md-content h5, .md-content h6 { font-family: var(--font-display); font-weight: 600; color: var(--text-primary); margin: 1.5rem 0 0.5rem; }
.md-content p { margin: 0.8rem 0; color: var(--text-secondary); }
.md-content strong { color: var(--text-primary); }
.md-content a { color: var(--cyan); text-decoration: none; }
.md-content a:hover { text-decoration: underline; }
.md-content ul, .md-content ol { margin: 0.8rem 0; padding-left: 1.5rem; color: var(--text-secondary); }
.md-content li { margin: 0.3rem 0; }
.md-content li::marker { color: var(--purple-light); }
.md-content code { font-family: var(--font-mono); font-size: 0.88em; background: rgba(124,58,237,0.12); color: var(--purple-light); padding: 0.15em 0.4em; border-radius: 4px; }
.md-content pre { background: var(--bg-surface); border: 1px solid rgba(124,58,237,0.15); border-radius: 10px; padding: 1.2rem; overflow-x: auto; margin: 1.2rem 0; }
.md-content pre code { background: none; padding: 0; color: var(--text-secondary); font-size: 0.85rem; }
.md-content blockquote { border-left: 3px solid var(--purple); padding: 0.5rem 1rem; margin: 1rem 0; background: rgba(124,58,237,0.06); border-radius: 0 8px 8px 0; color: var(--text-secondary); }
.md-content table { width: 100%; border-collapse: collapse; margin: 1.2rem 0; font-size: 0.92rem; }
.md-content thead th { background: rgba(124,58,237,0.12); color: var(--purple-light); font-family: var(--font-display); font-weight: 600; text-align: left; padding: 0.7rem 1rem; border-bottom: 2px solid rgba(124,58,237,0.25); }
.md-content tbody td { padding: 0.6rem 1rem; border-bottom: 1px solid rgba(241,240,245,0.06); color: var(--text-secondary); }
.md-content tbody tr:hover { background: rgba(124,58,237,0.04); }
.md-content hr { border: none; height: 1px; background: linear-gradient(90deg, transparent, var(--purple), var(--cyan), transparent); margin: 2rem 0; }
.md-content img { max-width: 100%; border-radius: 10px; margin: 1rem 0; }
.loading { text-align: center; color: var(--text-muted); padding: 4rem 0; font-family: var(--font-display); }
</style>
</head>
<body>
<div class="container">
  <a href="/" class="back-link">&larr; Back to Hub</a>
  <div id="content" class="md-content"><div class="loading">Loading...</div></div>
</div>
<script>
fetch('SOUL.md')
  .then(r => r.text())
  .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
  .catch(() => { document.getElementById('content').innerHTML = '<p style="color:#F43F5E">Failed to load document.</p>'; });
</script>
</body>
</html>
